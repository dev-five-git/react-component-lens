[test]
# Auto-applied to every `bun test` run so the VS Code extension's WASM-boundary
# and unit tests work without a manual `--preload` flag: this mocks the
# `vscode` module and copies the built WASM artifact next to the source
# (requires `bun run build` first). Keeps bunfig at the repo root only.
preload = ["./packages/vscode/test/wasmSetup.ts"]
# Coverage covers ONLY the 5 real VS Code extension source files:
#   packages/vscode/src/{analyzerWasm,codelens,decorations,extension,wasmHost}.ts
# The generated WASM glue (core_wasm.js, copied next to src by wasmSetup) and
# every file under packages/vscode/test/** are excluded from the report.
coverage = true
coverageSkipTestFiles = true
coverageReporter = ["text", "lcov"]
coveragePathIgnorePatterns = [
  "**/core_wasm.js",
  "**/test/**",
  "packages/vscode/test/**",
  "packages/vscode/src/core_wasm.js",
]
# Hard 100% gate on lines, functions, and statements for every covered file.
# (`WorkspaceHost` declares an explicit constructor so bun 1.3.9's synthetic
# default-constructor coverage bug — oven-sh/bun#29691 — does not cap function
# coverage; see the comment in src/wasmHost.ts.)
coverageThreshold = { lines = 1, functions = 1, statements = 1 }
